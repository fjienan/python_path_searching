# ============================================================
#  forest_searching — 统一参数文件（顶层 ros__parameters）
# ============================================================
#  所有节点共读此文件，无嵌套层级。
#  各节点通过 declare_parameter('key') 读取。
# ============================================================

/**:
  ros__parameters:

    # -------------------- 场地网格 --------------------
    map_origin:        [0.6, -0.6, 0.0]
    grid_rows:         4
    grid_cols:         3
    grid_resolution:   1.2
    start_row:         -1
    start_col:         0

    goal_grid_0:       [3, 0]
    goal_grid_1:       [3, 1]
    goal_grid_2:       [3, 2]

    # -------------------- Tracker 运动模式 --------------------
    # 'omnidirectional' : 全向（可横移），用 PID-x / PID-y / PID-yaw
    # 'unidirectional'  : 单向（只能前进），用 PID-dist / PID-angle
    motion_type:       'unidirectional'

    # -------------------- Tracker 控制频率 --------------------
    control_frequency: 50.0
    arrive_threshold:  0.12      # 判定到达目标的距离阈值 (m)
    angle_threshold:   0.02      # 判定角度对齐的阈值 (rad)

    # ---------- 全向模式 PID ----------
    kp_x:   3.0
    ki_x:   0.0
    kd_x:   0.2
    max_vel_x:   0.5

    kp_y:   1.0
    ki_y:   0.0
    kd_y:   0.5
    max_vel_y:   0.3

    kp_yaw:   0.1
    ki_yaw:   0.0
    kd_yaw:   0.0
    max_vel_yaw:   0.3

    # ---------- 单向模式 PID ----------
    kp_angle: 4.0
    ki_angle: 0.0
    kd_angle: 0.2
    max_angular:   2.0

    kp_dist: 2.5
    ki_dist: 0.0
    kd_dist: 0.1
    max_vel_forward:   0.5

    # ---------- 直线闭环校正 (MOVE 状态) ----------
    # 侧向误差 PID（仅 MOVE 阶段生效）
    kp_lateral:   1.0
    ki_lateral:   0.0
    kd_lateral:   0.2
    max_correction:   0.3      # 最大侧向校正速度 (m/s)
    lateral_threshold: 0.05     # 侧向误差超过此值时才启用校正

    # -------------------- Topics --------------------
    kfs_grid_data:        '/kfs_grid_data'
    planning_path:        '/planning/path'
    can_go:               '/can_go'
    planning_direction:   '/planning/direction'
    planning_trigger:     '/task/trigger'
    # odom_world:           '/odin1/odometry_highfreq'
    odom_world:         '/odom_world'
    # cmd_vel:              '/t0x0101'
    cmd_vel:            '/cmd_vel'
    tracker_direction:    '/direction'
    target_yaw_deg:       '/target_yaw_deg'

    # -------------------- Odom Simulator (仿真模式) ----------
    odom_frame:    'map'
    base_frame:    'base_link'
    publish_rate:  50.0

    # -------------------- A* Planner --------------------
    max_r2kfs_count: 2
