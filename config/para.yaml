# 轨迹跟踪参数配置文件

# --- 场地参数 ---
grid:
  ros__parameters:
    map_origin: [3.2, 1.2, 0.0]
    grid_rows: 4
    grid_cols: 3
    grid_resolution: 1.2
    start_row: -1
    start_col: 0
    goal_grid_0: [3, 0]
    goal_grid_1: [3, 1]
    goal_grid_2: [3, 2]

# --- Tracker 参数 ---
# motion_type: 'omnidirectional' (全向) / 'unidirectional' (只能向前)
tracker:
  ros__parameters:
    motion_type: 'omnidirectional'
    control_frequency: 50.0
    arrive_threshold: 0.02
    angle_threshold: 0.02

    # 全向模式 PID
    kp_x: 3.0
    ki_x: 0.1
    kd_x: 0.2
    max_vel_x: 0.5
    kp_y: 3.0
    ki_y: 0.1
    kd_y: 0.2
    max_vel_y: 0.5
    kp_yaw: 5.0
    ki_yaw: 0.1
    kd_yaw: 0.3
    max_vel_yaw: 2.0

    # 单向模式 PID
    kp_angle: 4.0
    ki_angle: 0.2
    kd_angle: 0.2
    max_angular: 2.0
    kp_dist: 2.5
    ki_dist: 0.2
    kd_dist: 0.1
    max_vel_forward: 0.5

# --- Odom 仿真器 ---
# enabled=true: 本地仿真（默认）
# enabled=false: 使用外部 SLAM 里程计（真实机器人模式）
# use_real_odom=true: 将外部 odom 转发到 /odom_world
odom_simulator:
  ros__parameters:
    motion_type: 'omnidirectional'
    odom_frame: 'map'
    base_frame: 'base_link'
    publish_rate: 50.0
    enabled: false
    use_real_odom: true
    topics:
      cmd_vel: '/cmd_vel'
      odom_world: '/odom_world'
      real_odom: '/odin1/odometry_highfreq'

# --- Topics ---
topics:
  ros__parameters:
    kfs_grid_data: '/kfs_grid_data'
    planning_path: '/planning/path'
    can_go: '/can_go'
    planning_direction: '/planning/direction'
    planning_trigger: '/task/trigger'
    odom_world: '/odom_world'
    cmd_vel: '/cmd_vel'
    tracker_direction: '/direction'
    target_yaw_deg: '/target_yaw_deg'
