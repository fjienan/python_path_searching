# ============================================================
#  forest_searching — 统一参数文件（顶层 ros__parameters）
# ============================================================
#  所有节点共读此文件，无嵌套层级。
#  各节点通过 declare_parameter('key') 读取。
# ============================================================

/**:
  ros__parameters:

    # -------------------- 场地网格 --------------------
    map_origin:        [0.6, -0.6, 0.0]
    grid_rows:         4
    grid_cols:         3
    grid_resolution:   1.2
    start_row:         -1
    start_col:         0

    goal_grid_0:       [3, 0]
    goal_grid_1:       [3, 1]
    goal_grid_2:       [3, 2]

    # -------------------- Tracker 运动模式 --------------------
    # 'omnidirectional' : 全向（可横移）
    # 'unidirectional'  : 单向（只能前进）
    motion_type:       'unidirectional'

    # -------------------- Tracker 控制频率 --------------------
    control_frequency: 100.0
    arrive_threshold:  0.08      # 判定到达目标的距离阈值 (m)
    angle_threshold:   0.03     # 判定角度对齐的阈值 (rad)

    # ---------- PID ----------
    kp_angle: 2.5
    ki_angle: 0.0
    kd_angle: 0.2
    max_angular:   3.0

    kp_dist: 2.5
    ki_dist: 0.0
    kd_dist: 0.1
    max_vel:   0.8

    # -------------------- Topics --------------------
    kfs_grid_data:        '/kfs_grid_data'
    planning_path:        '/planning/path'
    can_go:               '/can_go'
    planning_direction:   '/planning/direction'
    planning_trigger:     '/task/trigger'
    # odom_world:           '/odin1/odometry_highfreq'
    odom_world:         '/odom_world'
    # cmd_vel:              '/t0x0101'
    cmd_vel:            '/cmd_vel'
    tracker_direction:    '/direction'
    target_yaw_deg:       '/target_yaw_deg'
    suspension_state:     '/current_state'

    # -------------------- Odom Simulator (仿真模式) ----------
    odom_frame:    'map'
    base_frame:    'base_link'
    publish_rate:  50.0

    # -------------------- A* Planner --------------------
    max_r2kfs_count: 2
